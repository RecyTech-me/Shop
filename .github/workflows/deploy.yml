name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Validate before deploy
        run: |
          npm ci
          npm run verify
          npm run coverage:check

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT || 22 }}" -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload application files
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude 'node_modules/' \
            --exclude 'storage/' \
            --exclude 'public/uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT || 22 }}" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_PORT || 22 }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p storage public/uploads/products
            npm ci --omit=dev
            DATABASE_PATH="$(node -e "require('dotenv').config(); process.stdout.write(process.env.DATABASE_PATH || 'storage/shop.db')")"
            BACKUP_DIR="$(node -e "require('dotenv').config(); process.stdout.write(process.env.BACKUP_DIR || 'storage/backups')")"
            if [ -f "$DATABASE_PATH" ]; then
              npm run backup:sqlite -- --database="$DATABASE_PATH" --out-dir="$BACKUP_DIR"
            fi
            sudo systemctl restart shopsite
            sleep 2
            SHOP_PUBLIC_URL="${{ secrets.DEPLOY_URL }}" ALERT_WEBHOOK_URL="${{ secrets.ALERT_WEBHOOK_URL }}" npm run health:check
          EOF
